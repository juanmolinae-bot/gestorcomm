{% extends 'base.html' %}
{% block title %}Cerrar sesión{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card mt-4 shadow-sm">
            <div class="card-body text-center p-4">
                <i class="bi bi-box-arrow-right text-primary" style="font-size: 3rem;"></i>
                <h4 class="mt-3">¿Cerrar sesión?</h4>
                <p class="text-muted">Tu sesión se cerrará y serás redirigido al login.</p>
                <form method="post" class="d-inline">
                    {% csrf_token %}
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-danger">Sí, cerrar sesión</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
